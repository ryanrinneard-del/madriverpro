<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base href="/adult/">
<title>My Lessons — RR Golf Performance</title>
<meta name="description" content="Every coaching session you’ve had with Ryan, logged and searchable — upcoming first, then your history.">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .lesson-row {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 16px 18px;
    background: var(--white);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    margin-bottom: 10px;
    color: inherit;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .lesson-row:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(13,31,60,0.08);
  }
  .lesson-row.complete   { border-left-color: #2E7D32; }
  .lesson-row.scheduled  { border-left-color: var(--gold); }
  .lesson-row.pending    { border-left-color: var(--mid-grey); }
  .lesson-row .lnum {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 24px; color: var(--navy); font-weight: 600;
  }
  .lesson-row .lfocus {
    font-size: 13px; color: var(--mid-grey); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lesson-row .ldate {
    font-size: 12px; color: var(--navy-mid); white-space: nowrap;
  }
  @media (max-width: 640px) {
    .lesson-row {
      grid-template-columns: 40px 1fr auto;
      grid-template-rows: auto auto;
      gap: 8px 12px;
      padding: 14px 14px;
    }
    .lesson-row > :nth-child(3) { grid-column: 2; grid-row: 2; }
    .lesson-row > :nth-child(4) { grid-column: 3; grid-row: 1 / span 2; }
  }
</style>
</head>
<body>

<div id="nav-mount"></div>

<main class="container-narrow">

  <div class="page-header">
    <div class="page-label">MY LESSONS</div>
    <h1 class="page-title">Every Session, Logged</h1>
    <hr class="gold-rule">
    <p class="page-subtitle">
      Every lesson with Ryan &mdash; upcoming first, then your history. Tap any row to see
      the focus, the debrief, and your pre-work for next time.
    </p>
  </div>

  <div id="lessons-list"></div>

  <div style="margin-top:28px;">
    <a href="dashboard.html" class="btn btn-ghost">&larr; Back to dashboard</a>
  </div>

</main>

<div id="footer-mount"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
  (async () => {
    const user = await RRG.mount('lessons');
    if (!user) return;

    let lessons = [];
    try { lessons = await RRG.lessons.forUser(user.id); }
    catch (err) { console.warn('lessons load failed', err); }

    const wrap = document.getElementById('lessons-list');

    if (!lessons || lessons.length === 0) {
      wrap.innerHTML = `
        <div class="history-empty">
          <h3 class="navy">No lessons logged yet.</h3>
          <p class="muted mt-2">
            After each session with Ryan, the focus, your pre-work, and the debrief all land here.
          </p>
        </div>`;
      return;
    }

    const upcoming  = lessons.filter(l => !l.completed_at)
      .sort((a,b) => (a.scheduled_at||'').localeCompare(b.scheduled_at||''));
    const completed = lessons.filter(l =>  l.completed_at)
      .sort((a,b) => (b.scheduled_at||'').localeCompare(a.scheduled_at||''));
    const ordered = [...upcoming, ...completed];

    wrap.innerHTML = ordered.map(l => {
      const status = l.completed_at ? 'complete' : (l.scheduled_at ? 'scheduled' : 'pending');
      const statusBadge = {
        complete:  '<span class="badge badge-green">COMPLETE</span>',
        scheduled: '<span class="badge badge-gold">UPCOMING</span>',
        pending:   '<span class="badge badge-ghost">PENDING</span>',
      }[status];
      return `
        <a href="lesson.html?id=${l.id}" class="lesson-row ${status}" style="text-decoration:none;">
          <div class="lnum">#${String(l.number || '—').padStart(2,'0')}</div>
          <div>
            <div style="font-weight:700; color:var(--navy);">${RRG.esc(l.focus || 'Focus TBD')}</div>
            <div class="lfocus">${RRG.esc(l.pre_work || 'No pre-work yet')}</div>
          </div>
          <div class="ldate">${l.scheduled_at ? RRG.fmtDate(l.scheduled_at) : '—'}</div>
          <div>${statusBadge}</div>
        </a>
      `;
    }).join('');

  })();
</script>
</body>
</html>
