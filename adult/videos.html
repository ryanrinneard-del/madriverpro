<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base href="/adult/">
<title>My Videos — RR Golf Performance Adult Coaching</title>
<meta name="description" content="Every swing video you’ve uploaded, with Ryan’s review notes when available.">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .video-card {
    background: var(--white); border-radius: 8px; overflow: hidden;
    box-shadow: var(--shadow-sm); border-top: 2px solid var(--gold);
    margin-bottom: 20px;
  }
  .video-card .meta-row { padding: 14px 18px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; border-bottom: 1px solid var(--rule); }
  .video-card video { width: 100%; max-height: 420px; background: var(--navy); display: block; }
  .video-card .video-holder { position: relative; background: var(--navy); }
  .video-card .video-holder canvas {
    position: absolute; top: 0; left: 0; pointer-events: none;
  }
  .video-card .body { padding: 14px 18px; }
  .ann-timeline {
    height: 6px; background: var(--rule); border-radius: 999px;
    position: relative; margin: 8px 18px;
  }
  .ann-timeline .mark {
    position: absolute; top: -3px; width: 3px; height: 12px;
    background: var(--gold); border-radius: 2px; cursor: pointer;
  }
  .ann-timeline .mark:hover { background: var(--navy); }
  .video-card .actions { padding: 12px 18px; background: var(--light-bg); display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<main class="container">

  <div class="page-header">
    <div class="page-label">MY UPLOADS</div>
    <h1 class="page-title">My Videos</h1>
    <hr class="gold-rule">
    <p class="page-subtitle">
      Every swing video you've sent Ryan, in one place. Review inline, re-download for your
      own use, or delete what you don't need anymore.
    </p>
  </div>

  <div id="new-banner" style="display:none;" class="callout mb-4">
    <b>Video sent.</b> Ryan has been notified. Watch for his feedback at your next session.
  </div>

  <div class="flex-between mb-4">
    <div class="stat-strip" style="flex:1; margin-right:16px;" id="summary"></div>
    <a class="btn btn-primary" href="upload-video.html">+ Upload Another</a>
  </div>

  <div id="videos-wrap"></div>

</main>

<div id="footer-mount"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
  (async () => {
    const user = await RRG.mount('videos');
    if (!user) return;

  if (RRG.qs('new')) document.getElementById('new-banner').style.display = 'block';

  const videos = RRG.videos.forUser(user.id);
  const reviewed = videos.filter(v => v.status === 'reviewed').length;

  document.getElementById('summary').innerHTML = `
    <div class="stat-cell"><div class="val">${videos.length}</div><div class="lbl">Uploaded</div></div>
    <div class="stat-cell"><div class="val">${videos.length - reviewed}</div><div class="lbl">Awaiting Review</div></div>
    <div class="stat-cell"><div class="val">${reviewed}</div><div class="lbl">Reviewed</div></div>
  `;

  const wrap = document.getElementById('videos-wrap');
  if (videos.length === 0) {
    wrap.innerHTML = `
      <div class="history-empty">
        <h3 class="navy">No videos yet.</h3>
        <p class="muted mt-2">Send Ryan your first swing clip so he can review it between sessions.</p>
        <a class="btn btn-primary mt-4" href="upload-video.html">Upload a Video &uarr;</a>
      </div>
    `;
  } else {
    wrap.innerHTML = videos.map(v => {
      const lesson = v.lessonId ? RRG.lessons.all().find(l => l.id === v.lessonId) : null;
      const statusBadge = v.status === 'reviewed'
        ? '<span class="badge badge-green">REVIEWED</span>'
        : '<span class="badge badge-gold">AWAITING REVIEW</span>';
      const annCount = (v.annotations || []).length;
      const annFrames = new Set((v.annotations || []).map(a => a.t.toFixed(2))).size;
      return `
        <div class="video-card" data-vid="${v.id}">
          <div class="meta-row">
            <div>
              <div style="font-weight:700; color:var(--navy);">${RRG.esc(v.filename)}</div>
              <div class="muted small mt-2">
                ${RRG.fmtDate(v.createdAt)} ·
                ${RRG.fmtBytes(v.size)}
                ${v.club ? ' · ' + RRG.esc(v.club) : ''}
                ${v.angle ? ' · ' + RRG.esc(v.angle) : ''}
                ${lesson ? ` · <a href="lesson.html?id=${lesson.id}">Lesson ${lesson.number}</a>` : ''}
                ${annCount ? ` · <b class="gold">${annCount} annotation${annCount>1?'s':''} · ${annFrames} frame${annFrames>1?'s':''}</b>` : ''}
              </div>
            </div>
            <div>${statusBadge}</div>
          </div>
          <div class="video-holder" data-vid="${v.id}">
            <video controls data-vid="${v.id}" onerror="markStale('${v.id}')"></video>
            <canvas data-vid="${v.id}"></canvas>
          </div>
          <div class="stale-notice" data-vid="${v.id}" style="display:none; padding:20px; background:#FFF8EC; color:var(--navy-mid); text-align:center; font-size:13px; border-top:1px solid var(--rule);">
            <b>This video file isn\u2019t on this device.</b> You\u2019ll need to re-upload it
            from the browser where it was originally sent. Production (Vercel Blob) syncs
            uploads to the cloud so this stops happening.
          </div>
          ${annCount ? `<div class="ann-timeline" data-vid="${v.id}"></div>
            <div class="body" style="padding-top:0; color:var(--mid-grey); font-size:12px;">
              Gold marks = frames where Ryan left annotations. Click one to jump; pause playback to see the drawings.
            </div>` : ''}
          ${v.note ? `<div class="body"><div class="page-label">MY NOTE TO RYAN</div><p class="mt-2">${RRG.esc(v.note)}</p></div>` : ''}
          ${v.coachFeedback ? `
            <div class="body" style="border-top:1px solid var(--rule); background:var(--cream);">
              <div class="page-label">RYAN'S FEEDBACK</div>
              <p class="mt-2" style="color:var(--navy-mid);"><i>${RRG.esc(v.coachFeedback)}</i></p>
            </div>
          ` : ''}
          <div class="actions">
            <a class="btn btn-ghost btn-sm" href="#" data-dl="${v.id}" data-filename="${RRG.esc(v.filename)}" onclick="downloadVid(event, '${v.id}', '${RRG.esc(v.filename).replace(/'/g,"\\'")}')">Download</a>
            <button class="btn btn-ghost btn-sm" style="color:var(--red-risk);" onclick="removeVid('${v.id}')">Delete</button>
          </div>
        </div>
      `;
    }).join('');

    // Async: hydrate every <video> with a fresh blob URL from IndexedDB
    (async () => {
      for (const v of videos) {
        const url = await RRG.idb.blobUrlFor(v.id);
        const vid = document.querySelector(`video[data-vid="${v.id}"]`);
        if (!vid) continue;
        if (url) {
          vid.src = url;
        } else {
          markStale(v.id);
        }
      }
    })();

    // Wire up annotation overlays on each video (IDB-loaded URL is hydrated above)
    videos.filter(v => (v.annotations || []).length).forEach(v => {
      const video = document.querySelector(`video[data-vid="${v.id}"]`);
      const canvas = document.querySelector(`canvas[data-vid="${v.id}"]`);
      const timeline = document.querySelector(`.ann-timeline[data-vid="${v.id}"]`);
      if (!video || !canvas) return;
      const ctx = canvas.getContext('2d');

      function resize() {
        if (!video.videoWidth) return;
        const r = video.getBoundingClientRect();
        canvas.style.width = r.width + 'px';
        canvas.style.height = r.height + 'px';
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      video.addEventListener('loadedmetadata', () => {
        resize();
        renderAnnTimeline();
      });
      window.addEventListener('resize', resize);

      function renderAnnTimeline() {
        if (!timeline || !video.duration) return;
        timeline.innerHTML = '';
        const seen = new Set();
        (v.annotations || []).forEach(a => {
          const key = a.t.toFixed(2);
          if (seen.has(key)) return; seen.add(key);
          const pct = (a.t / video.duration) * 100;
          const mark = document.createElement('div');
          mark.className = 'mark';
          mark.style.left = `calc(${pct}% - 1.5px)`;
          mark.title = 'Jump to ' + a.t.toFixed(2) + 's';
          mark.onclick = () => { video.pause(); video.currentTime = a.t; };
          timeline.appendChild(mark);
        });
      }

      function drawAnn(ctx, a) {
        ctx.strokeStyle = a.color; ctx.fillStyle = a.color;
        ctx.lineWidth = a.width; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        const pts = a.points;
        if (a.tool === 'pen') {
          if (pts.length < 2) return;
          ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          ctx.stroke();
        } else if (a.tool === 'line' && pts.length >= 2) {
          ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y); ctx.stroke();
        } else if (a.tool === 'arrow' && pts.length >= 2) {
          const [s, e] = pts;
          ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
          const ang = Math.atan2(e.y - s.y, e.x - s.x);
          const ah = Math.max(10, a.width * 3);
          ctx.beginPath();
          ctx.moveTo(e.x, e.y);
          ctx.lineTo(e.x - ah * Math.cos(ang - Math.PI/7), e.y - ah * Math.sin(ang - Math.PI/7));
          ctx.lineTo(e.x - ah * Math.cos(ang + Math.PI/7), e.y - ah * Math.sin(ang + Math.PI/7));
          ctx.closePath(); ctx.fill();
        } else if (a.tool === 'rect' && pts.length >= 2) {
          const [s, e] = pts;
          ctx.strokeRect(s.x, s.y, e.x - s.x, e.y - s.y);
        } else if (a.tool === 'circle' && pts.length >= 2) {
          const [s, e] = pts;
          const r = Math.hypot(e.x - s.x, e.y - s.y);
          ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.stroke();
        } else if (a.tool === 'angle' && pts.length === 3) {
          const [p1, vp, p2] = pts;
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(vp.x, vp.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
          const a1 = Math.atan2(p1.y - vp.y, p1.x - vp.x);
          const a2 = Math.atan2(p2.y - vp.y, p2.x - vp.x);
          let deg = Math.abs((a2 - a1) * 180 / Math.PI);
          if (deg > 180) deg = 360 - deg;
          ctx.font = Math.max(14, a.width * 4) + 'px Helvetica';
          ctx.fillText(deg.toFixed(0) + '°', vp.x + 8, vp.y - 8);
        }
      }

      function redraw() {
        if (!canvas.width) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!video.paused) return;
        const t = video.currentTime;
        (v.annotations || []).filter(a => Math.abs(a.t - t) < 0.12).forEach(a => drawAnn(ctx, a));
      }
      video.addEventListener('timeupdate', redraw);
      video.addEventListener('pause', redraw);
      video.addEventListener('play', redraw);
    });
  }

  window.removeVid = async (id) => {
    if (!confirm('Delete this video? This cannot be undone.')) return;
    await RRG.videos.remove(id);
    location.reload();
  };

  // Async download: fetch the blob from IDB and trigger a local download
  window.downloadVid = async (ev, id, filename) => {
    ev.preventDefault();
    const blob = await RRG.idb.getVideo(id);
    if (!blob) { RRG.toast('This video isn\u2019t on this device.'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename || 'video.mp4';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  };

  // Show friendly message if a video's blob URL is stale (cross-session)
  window.markStale = (id) => {
    const card = document.querySelector(`.video-card[data-vid="${id}"]`);
    if (!card) return;
    const holder = card.querySelector('.video-holder');
    const notice = card.querySelector(`.stale-notice[data-vid="${id}"]`);
    if (holder) holder.style.display = 'none';
    if (notice) notice.style.display = 'block';
  };

  })();
</script>
</body>
</html>
