<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Profile Review — Ryan Rinneard Golf</title>
<style>
:root {
  --navy: #0A1628;
  --navy-mid: #1A2E4A;
  --gold: #C9A84C;
  --bg: #F7F8FA;
  --rule: #DDE3EC;
  --text: #1A1A2E;
  --muted: #6B7A8F;
  --ok: #2F7D4F;
  --warn: #C08300;
  --err: #B3261E;
}
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
header { background:var(--navy); color:#fff; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
header h1 { margin:0; font-size:18px; letter-spacing:.5px; }
header .logout { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.3); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
header .logout:hover { background:rgba(255,255,255,.1); }
main { max-width:1100px; margin:0 auto; padding:24px; }
.login-card { max-width:420px; margin:80px auto; background:#fff; padding:32px; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,.08); }
.login-card h2 { margin:0 0 8px 0; color:var(--navy); }
.login-card p { color:var(--muted); font-size:14px; margin:0 0 20px 0; }
input[type=password], input[type=text] { width:100%; padding:10px 12px; border:1px solid var(--rule); border-radius:6px; font-size:14px; font-family:inherit; }
button.primary { background:var(--navy); color:#fff; border:none; padding:10px 20px; border-radius:6px; font-weight:600; cursor:pointer; font-size:14px; }
button.primary:hover { background:var(--navy-mid); }
button.primary:disabled { opacity:.5; cursor:not-allowed; }
button.approve { background:var(--ok); color:#fff; border:none; padding:8px 16px; border-radius:6px; font-weight:600; cursor:pointer; font-size:13px; }
button.approve:disabled { background:#aaa; cursor:not-allowed; }
.submission { background:#fff; border:1px solid var(--rule); border-radius:10px; padding:20px; margin-bottom:16px; }
.submission .head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
.submission h3 { margin:0; color:var(--navy); font-size:17px; }
.submission .meta { color:var(--muted); font-size:13px; margin-top:4px; }
.status-pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.status-analyzing { background:#fff3cd; color:#856404; }
.status-pdf-pending { background:#cfe2ff; color:#084298; }
.status-ready { background:#d1e7dd; color:#0f5132; }
.status-approved { background:#e8e4ff; color:#4a3aa8; }
.status-error { background:#f8d7da; color:#842029; }
.assets { margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }
.assets a { background:var(--bg); color:var(--navy); text-decoration:none; padding:6px 12px; border-radius:6px; font-size:13px; font-weight:500; border:1px solid var(--rule); }
.assets a:hover { border-color:var(--gold); }
.assets a[aria-disabled=true] { opacity:.45; pointer-events:none; }
.actions { margin-top:14px; display:flex; gap:10px; align-items:center; }
.empty { color:var(--muted); text-align:center; padding:60px 0; }
.error { color:var(--err); font-size:13px; margin-top:8px; }
.notice { background:#fff3cd; color:#856404; padding:12px 16px; border-radius:6px; margin-bottom:16px; font-size:13px; }
</style>
</head>
<body>
<div id="loginView" style="display:none">
  <main>
    <div class="login-card">
      <h2>Profile Review</h2>
      <p>Enter the admin password to continue.</p>
      <form id="loginForm">
        <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password" required>
        <div style="height:12px"></div>
        <button type="submit" class="primary">Sign In</button>
        <div class="error" id="loginError" style="display:none"></div>
      </form>
    </div>
  </main>
</div>

<div id="appView" style="display:none">
  <header>
    <h1>Profile Review</h1>
    <button class="logout" id="logoutBtn">Sign out</button>
  </header>
  <main>
    <div id="notice" class="notice" style="display:none"></div>
    <div id="list"><div class="empty">Loading…</div></div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);

async function loadSubmissions() {
  const res = await fetch('/api/list-submissions', { credentials:'same-origin' });
  if (res.status === 401) { showLogin(); return; }
  if (!res.ok) {
    $('list').innerHTML = '<div class="empty">Failed to load submissions.</div>';
    return;
  }
  const { submissions } = await res.json();
  renderList(submissions || []);
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleString('en-US', { dateStyle:'medium', timeStyle:'short' }); }
  catch { return iso; }
}

function statusClass(s) { return 'status-' + (s || 'analyzing').replace(/ /g,'-'); }

function renderList(submissions) {
  const root = $('list');
  if (!submissions.length) {
    root.innerHTML = '<div class="empty">No submissions yet.</div>';
    return;
  }
  root.innerHTML = '';
  for (const s of submissions) {
    const a = s.assets || {};
    const allPdfs = a.session1_plan && a.arc && a.dossier;
    const canApprove = allPdfs && s.status !== 'approved';

    const el = document.createElement('div');
    el.className = 'submission';
    el.innerHTML = `
      <div class="head">
        <div>
          <h3>${escapeHtml(s.studentName || 'Unnamed')}</h3>
          <div class="meta">
            ${escapeHtml(s.studentEmail || '')} &middot;
            Submitted ${fmtDate(s.submittedAt)} &middot;
            ID <code>${escapeHtml(s.id)}</code>
          </div>
        </div>
        <span class="status-pill ${statusClass(s.status)}">${escapeHtml(s.status || 'analyzing')}</span>
      </div>
      <div class="assets">
        <a href="${a.analysis || '#'}" target="_blank" rel="noopener" aria-disabled="${!a.analysis}">Analysis (.md)</a>
        <a href="${a.session1_plan || '#'}" target="_blank" rel="noopener" aria-disabled="${!a.session1_plan}">Session 1 Plan (.pdf)</a>
        <a href="${a.arc || '#'}" target="_blank" rel="noopener" aria-disabled="${!a.arc}">6-Week Arc (.pdf)</a>
        <a href="${a.dossier || '#'}" target="_blank" rel="noopener" aria-disabled="${!a.dossier}">Dossier (.pdf)</a>
        <a href="${a.submission || '#'}" target="_blank" rel="noopener" aria-disabled="${!a.submission}">Raw submission (.json)</a>
      </div>
      <div class="actions">
        <button class="approve" data-id="${escapeHtml(s.id)}" ${canApprove?'':'disabled'}>
          ${s.status === 'approved' ? 'Approved ✓' : (allPdfs ? 'Approve & Email PDFs' : 'Waiting for PDFs…')}
        </button>
        <span class="error" data-err="${escapeHtml(s.id)}"></span>
      </div>
    `;
    root.appendChild(el);
  }
  root.querySelectorAll('button.approve').forEach((btn) => {
    btn.addEventListener('click', () => approve(btn.dataset.id, btn));
  });
}

async function approve(id, btn) {
  if (!confirm('Send the three PDFs to the student and ryan@rrgolfperformance.com?')) return;
  btn.disabled = true; btn.textContent = 'Sending…';
  const errEl = document.querySelector(`[data-err="${CSS.escape(id)}"]`);
  errEl.textContent = '';
  try {
    const res = await fetch('/api/approve-profile', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      credentials:'same-origin',
      body: JSON.stringify({ id })
    });
    const json = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    await loadSubmissions();
  } catch (err) {
    btn.disabled = false; btn.textContent = 'Approve & Email PDFs';
    errEl.textContent = err.message;
  }
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function showLogin() {
  $('appView').style.display = 'none';
  $('loginView').style.display = 'block';
  setTimeout(() => $('pw').focus(), 0);
}
function showApp() {
  $('loginView').style.display = 'none';
  $('appView').style.display = 'block';
  loadSubmissions();
}

$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('loginError').style.display = 'none';
  const pw = $('pw').value;
  const res = await fetch('/api/admin-auth', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    credentials:'same-origin',
    body: JSON.stringify({ password: pw })
  });
  if (res.ok) { $('pw').value=''; showApp(); }
  else {
    const j = await res.json().catch(()=>({}));
    $('loginError').textContent = j.error || 'Login failed.';
    $('loginError').style.display = 'block';
  }
});

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin-auth', { method:'DELETE', credentials:'same-origin' });
  showLogin();
});

// Probe auth on load
(async () => {
  const res = await fetch('/api/list-submissions', { credentials:'same-origin' });
  if (res.status === 401) showLogin();
  else showApp();
})();
</script>
</body>
</html>
